# This experiment evaluates the robustness of RoseCDL to noise, and
# makes sure the runtime using SLS is not impacted by high noise levels.
# Runs RoseCDL with Adam and SLS, for 3 noise levels, with 5 seeds.
solver:
    - rosecdl:
        outliers_kwargs:
        n_csc_iterations: 50
        optimizer: [adam, linesearch]
        sample_window,mini_batch_size: [
            [64, 256]
        ]
objective:
    - convolutional dictionary learning:
        reg: [0.8]
dataset:
    - simulated:
        n_samples: [10]
        n_times: [131072]
        # We use n_atoms to generate data and add 5 to run CDL,
        # making it possible to recover them. So in total, RoseCDL
        # runs with 10 atoms.
        n_atoms: 5
        n_times_atom: 64
        random_state: [938425, 923842, 29081990, 4112023, 8031989]
        noise_std: [0.01, 0.1, 0.3]
        contamination: False
timeout: 1800
max-runs: 100
output: benchmark_noise
